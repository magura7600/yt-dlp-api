<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Direct Link Extractor</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
    h1 { text-align: center; color: #333; }
    input { width: 100%; padding: 12px; font-size: 16px; margin: 10px 0; box-sizing: border-box; }
    button { padding: 12px 20px; font-size: 16px; background: #ff0000; color: white; border: none; cursor: pointer; }
    button:hover { background: #cc0000; }
    #result { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; }
    .format-container { margin-top: 15px; }
    .format { 
      margin: 8px 0; 
      padding: 12px; 
      background: #e0f7fa; 
      border-radius: 5px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .btn-play {
      text-decoration: none; 
      font-weight: bold; 
      color: white; 
      background: #28a745; 
      padding: 6px 12px; 
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }
    .btn-play:hover { background: #218838; }
    .thumbnail { max-width: 100%; height: auto; border-radius: 5px; margin-bottom: 10px; }
    .player-section { margin-top: 20px; padding: 10px; background: #000; border-radius: 8px; text-align: center; display: none; }
    video { width: 100%; max-height: 400px; }
  </style>
</head>
<body>
  <h1>YouTube Direct Link Extractor</h1>
  
  <input type="text" id="youtubeUrl" placeholder="YouTube লিংক পেস্ট করো..." />
  <button onclick="getLinks()">ডাইরেক্ট লিংক বের করো</button>

  <div id="result"></div>

  <script>
    const API_BASE = "https://yt-dlp-api-production-13d9.up.railway.app";
    let activeAudio = null;

    async function getLinks() {
      const url = document.getElementById("youtubeUrl").value.trim();
      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = "<p>লোড হচ্ছে...</p>";

      if (activeAudio) { activeAudio.pause(); }

      if (!url) {
        resultDiv.innerHTML = "<p style='color:red'>লিংক দিন!</p>";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/info?url=${encodeURIComponent(url)}`);
        const data = await res.json();

        if (data.error) {
          resultDiv.innerHTML = `<p style='color:red'>Error: ${data.error}</p>`;
          return;
        }

        const minutes = Math.floor(data.duration / 60);
        const seconds = data.duration % 60;

        let html = `<h2>${data.title}</h2>`;
        if (data.thumbnail) {
          html += `<img src="${data.thumbnail}" class="thumbnail" alt="Thumbnail"><br>`;
        }
        html += `<p>সময়: ${minutes}:${seconds < 10 ? '0' : ''}${seconds} মিনিট</p>`;
        
        // প্লেয়ার এরিয়া
        html += `
          <div id="playerSection" class="player-section">
            <h4 style="color: white; margin: 5px 0;" id="playingQuality"></h4>
            <video id="customVideo" controls></video>
          </div>
        `;

        html += `<div class="format-container"><h3>ডাউনলোড ও প্লে অপশনসমূহ:</h3>`;

        if (data.formats && data.formats.length > 0) {
          data.formats.forEach((f, index) => {
            // JSON অবজেক্টটি স্ট্রিং এ রূপান্তর করে বাটনে পাস করা হচ্ছে
            const formatData = encodeURIComponent(JSON.stringify(f));
            html += `
              <div class="format">
                <span><strong>${f.quality}</strong> (${f.ext})</span>
                <button onclick="playVideo('${formatData}', '${f.quality}')" class="btn-play">▶️ প্লে করো</button>
              </div>`;
          });
        } else {
          html += `<p style='color:red'>কোনো রেজুলেশন পাওয়া যায়নি।</p>`;
        }

        html += `</div>`;
        resultDiv.innerHTML = html;
      } catch (err) {
        console.error(err);
        resultDiv.innerHTML = "<p style='color:red'>সমস্যা হয়েছে। আবার চেষ্টা করো।</p>";
      }
    }

    function playVideo(formatStr, quality) {
      const format = JSON.parse(decodeURIComponent(formatStr));
      const video = document.getElementById("customVideo");
      const playerSection = document.getElementById("playerSection");
      const playingQuality = document.getElementById("playingQuality");

      playerSection.style.display = "block";
      playingQuality.innerText = "প্লে হচ্ছে: " + quality;

      // আগের কোনো অডিও ট্র্যাক চালু থাকলে বন্ধ করা
      if (activeAudio) { activeAudio.pause(); activeAudio = null; }

      video.src = format.video_url;

      // যদি আলাদা অডিওর প্রয়োজন হয় (১০৮০p / ৭২০p ইত্যাদি এর জন্য)
      if (!format.is_merged && format.audio_url) {
        const audio = new Audio(format.audio_url);
        activeAudio = audio;

        // ভিডিও কন্ট্রোলসের সাথে অডিওর গতি সিঙ্ক করা
        video.onplay = () => audio.play();
        video.onpause = () => audio.pause();
        video.onseeking = () => { audio.currentTime = video.currentTime; };
        video.onseeked = () => { audio.currentTime = video.currentTime; };
        video.onratechange = () => { audio.playbackRate = video.playbackRate; };
        
        // ভলিউম সিঙ্ক
        video.onvolumechange = () => {
          if (video.muted) { audio.muted = true; } 
          else { audio.muted = false; audio.volume = video.volume; }
        };
      } else {
        // যদি ৩৬০p প্রোগ্রেসিভ ফরম্যাট হয়, সরাসরি প্লে হবে
        video.onplay = null; video.onpause = null; video.onseeking = null; video.onseeked = null; video.onvolumechange = null;
      }

      video.play();
      // স্ক্রল করে প্লেয়ারের কাছে নিয়ে যাওয়া
      playerSection.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
